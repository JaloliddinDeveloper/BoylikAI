name: CD — Deploy to DigitalOcean

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest commit SHA)"
        required: false

env:
  REGISTRY: ghcr.io
  DOTNET_VERSION: "8.0.x"

jobs:
  # ── Build & Push Docker Images ────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT

      # ── API Image ─────────────────────────────────────────────────────────
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/BoylikAI.API/Dockerfile
          push: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/boylikaI-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/boylikaI-api:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      # ── Bot Image ─────────────────────────────────────────────────────────
      - name: Build & push Bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/BoylikAI.TelegramBot/Dockerfile
          push: true
          cache-from: type=gha,scope=bot
          cache-to: type=gha,scope=bot,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/boylikaI-bot:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/boylikaI-bot:latest

  # ── Deploy to DigitalOcean ────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-push
    environment: production  # Requires manual approval if configured in GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          script: |
            set -euo pipefail

            cd /opt/boylikaI

            # Pull latest config from git
            git fetch origin master
            git reset --hard origin/master

            # Authenticate to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Set image tag for this deployment
            export IMAGE_TAG="${{ needs.build-push.outputs.image_tag }}"
            export GITHUB_REPO="${{ github.repository_owner }}"

            echo "Deploying image tag: ${IMAGE_TAG}"

            # Pull new images before stopping old ones (minimize downtime)
            docker compose -f docker-compose.prod.yml pull api bot

            # Run migrations before starting new API
            docker compose -f docker-compose.prod.yml run --rm migrate

            # Rolling restart — Nginx keeps serving during restart
            docker compose -f docker-compose.prod.yml up -d \
              --remove-orphans \
              --no-deps \
              api bot

            # Wait for health check to pass
            echo "Waiting for API health check..."
            timeout 120 bash -c \
              'until docker exec boylikaI-api wget -qO- http://localhost:8080/health > /dev/null; do sleep 3; done'

            # Clean up old images
            docker image prune -f

            echo "Deployment complete — tag ${IMAGE_TAG}"

      - name: Notify deployment status
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_DEPLOY_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_DEPLOY_BOT_TOKEN }}
          message: |
            ${{ job.status == 'success' && '✅' || '❌' }} BoylikAI deployment ${{ job.status }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Actor: ${{ github.actor }}
