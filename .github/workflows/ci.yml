name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

env:
  DOTNET_VERSION: "8.0.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  # ── Build & Unit Tests ────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore -c Release

      - name: Unit Tests
        run: |
          dotnet test tests/BoylikAI.Domain.Tests \
            --no-build -c Release \
            --logger "trx;LogFileName=domain-results.trx" \
            --collect:"XPlat Code Coverage"

          dotnet test tests/BoylikAI.Application.Tests \
            --no-build -c Release \
            --logger "trx;LogFileName=application-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: "**/*.trx"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit

  # ── Integration Tests (TestContainers) ───────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Integration tests need Docker — ubuntu-latest has Docker pre-installed

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Integration Tests
        run: |
          dotnet test tests/BoylikAI.Integration.Tests \
            --no-build -c Release \
            --logger "trx;LogFileName=integration-results.trx" \
            --collect:"XPlat Code Coverage" \
            -- RunConfiguration.TestSessionTimeout=300000

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: "**/*.trx"

  # ── Docker Build Validation ───────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/BoylikAI.API/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: boylikai-api:ci

      - name: Build Bot image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/BoylikAI.TelegramBot/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: boylikai-bot:ci
