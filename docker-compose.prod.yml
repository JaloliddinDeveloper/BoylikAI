version: "3.9"

# Production Docker Compose — DigitalOcean Ubuntu deployment
# Secrets come from .env file on the server (never committed to git)
# Images are pulled from GitHub Container Registry (ghcr.io)

services:

  # ── Nginx — TLS termination & reverse proxy ───────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: boylikaI-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - boylikaI-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Certbot — SSL certificate management ─────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: boylikaI-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Runs once; systemd timer or cron renews every 12h
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    networks:
      - boylikaI-net

  # ── API ───────────────────────────────────────────────────────────────────
  api:
    image: ghcr.io/${GITHUB_REPO}/boylikaI-api:${IMAGE_TAG:-latest}
    container_name: boylikaI-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ApplyMigrations: "false"
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=boylikaidb;Username=boylikaiadmin;Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379,abortConnect=false,connectRetry=3
      Anthropic__ApiKey: ${ANTHROPIC_API_KEY}
      Telegram__BotToken: ${TELEGRAM_BOT_TOKEN}
      Telegram__WebhookSecret: ${TELEGRAM_WEBHOOK_SECRET}
      Telegram__WebhookUrl: ${TELEGRAM_WEBHOOK_URL}
      Seq__Url: http://seq:5341
      Otlp__Endpoint: http://otel-collector:4317
    # No external port — Nginx proxies internally
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - boylikaI-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Migration Runner — runs once before API starts ────────────────────────
  migrate:
    image: ghcr.io/${GITHUB_REPO}/boylikaI-api:${IMAGE_TAG:-latest}
    container_name: boylikaI-migrate
    command: ["./efbundle", "--connection", "Host=postgres;Port=5432;Database=boylikaidb;Username=boylikaiadmin;Password=${POSTGRES_PASSWORD}"]
    environment:
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=boylikaidb;Username=boylikaiadmin;Password=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - boylikaI-net
    restart: "no"

  # ── Telegram Bot Worker ───────────────────────────────────────────────────
  bot:
    image: ghcr.io/${GITHUB_REPO}/boylikaI-bot:${IMAGE_TAG:-latest}
    container_name: boylikaI-bot
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=boylikaidb;Username=boylikaiadmin;Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379,abortConnect=false,connectRetry=3
      Anthropic__ApiKey: ${ANTHROPIC_API_KEY}
      Telegram__BotToken: ${TELEGRAM_BOT_TOKEN}
      Seq__Url: http://seq:5341
    depends_on:
      api:
        condition: service_healthy
    networks:
      - boylikaI-net

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: boylikaI-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: boylikaidb
      POSTGRES_USER: boylikaiadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No external port — only internal access
    expose:
      - "5432"
    networks:
      - boylikaI-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boylikaiadmin -d boylikaidb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: boylikaI-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - boylikaI-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Seq — Structured Logging ──────────────────────────────────────────────
  seq:
    image: datalust/seq:latest
    container_name: boylikaI-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORDHASH: ${SEQ_ADMIN_PASSWORD_HASH}
    volumes:
      - seq_data:/data
    expose:
      - "80"
      - "5341"
    networks:
      - boylikaI-net

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: boylikaI-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.listen-address=:9090'
    expose:
      - "9090"
    networks:
      - boylikaI-net

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: boylikaI-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${DOMAIN}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    expose:
      - "3000"
    depends_on:
      - prometheus
    networks:
      - boylikaI-net

  # ── OpenTelemetry Collector ───────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: boylikaI-otel
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./docker/otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    expose:
      - "4317"
      - "4318"
    networks:
      - boylikaI-net

networks:
  boylikaI-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  seq_data:
  prometheus_data:
  grafana_data:
  certbot_www:
  certbot_certs:
  nginx_logs:
